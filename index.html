<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kurbağa Kas Simülasyonu - Fizyo Lab</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: none; overflow: hidden; background-color: #f3f4f6; font-family: sans-serif; user-select: none; }
        .head-bounce { animation: bounce 2s infinite ease-in-out; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }
        .toast-enter { animation: fadein 0.5s; }
        @keyframes fadein {
            from { top: 0; opacity: 0; }
            to { top: 30px; opacity: 1; }
        }

        /* Canvas Scrollbar Styles */
        input[type=range].time-scroll {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range].time-scroll::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 40px;
            border-radius: 3px;
            background: #4B5563;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range].time-scroll::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #D1D5DB;
            border-radius: 2px;
        }
        
        .modal-enter { animation: zoomIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes zoomIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- VERİ YAPILARI (BÖLÜM 1) ---
        const STEPS = [
            { id: 1, image: '01frog.png', instruction: 'Kurbağanın bacağındaki deriyi soymak için önce penset ile tut, sonra makas ile kes.' },
            { id: 2, image: '02bacak_soy.png', instruction: 'Siyatik siniri izole et. Portegü ve penset ile kasları zıt yönde ayır.' },
            { id: 3, image: '03siyatik.png', instruction: 'Araç kutusundan penseti al, kurutma kağıdına yaklaştırıp al ve siyatik sinirin altına koy.' },
            { id: 4, image: '04siyatikizole.png', instruction: 'İpi al ve Aşil tendonunu bağla.' },
            { id: 5, image: '05knot_asil.png', instruction: 'Makası al ve Aşil tendonunu kes.' },
            { id: 6, image: '06cutandtie.png', instruction: 'Ataç aracı ile kesilmiş aşil tendonunu tut ve kancaya as.' },
            { id: 7, image: '07final.png', instruction: 'Deney düzeneği hazır. Sağ üstteki butondan kayda başlayabilirsiniz.' }
        ];

        const TOOLS = [
            { id: 'portegu', src: 'portegu.png', name: 'Portegü' },
            { id: 'makas', src: 'makas.png', name: 'Makas' },
            { id: 'penset', src: 'penset.png', name: 'Penset' },
            { id: 'kagit', src: 'kurutmakagidi.png', name: 'Kurutma Kağıdı' },
            { id: 'ip', src: 'ip.png', name: 'İp' },
            { id: 'atac', src: 'atac.png', name: 'Ataç' } 
        ];

        // ==========================================
        // COMPONENT: BÖLÜM 1 (HAZIRLIK)
        // ==========================================
        const Part1 = ({ onComplete }) => {
            const [stepIndex, setStepIndex] = useState(0);
            const [activeTool, setActiveTool] = useState(null);
            const [toolPos, setToolPos] = useState({ x: 0, y: 0 });
            const [toolRotation, setToolRotation] = useState(0);
            
            const [attachedItem, setAttachedItem] = useState(null); 
            const [placedTools, setPlacedTools] = useState([]); 
            const [dragPath, setDragPath] = useState(null); 
            const [toastMsg, setToastMsg] = useState('');
            
            const [isAnimatingStep1, setIsAnimatingStep1] = useState(false);
            const [showFinalModal, setShowFinalModal] = useState(false);

            const containerRef = useRef(null);
            const currentStep = STEPS[stepIndex];

            useEffect(() => {
                if (stepIndex === STEPS.length - 1) {
                    setShowFinalModal(true);
                    setTimeout(() => setShowFinalModal(false), 2000);
                }
            }, [stepIndex]);

            const showToast = (msg) => { setToastMsg(msg); setTimeout(() => setToastMsg(''), 3000); };
            const checkDistance = (x1, y1, x2, y2) => Math.hypot(x1 - x2, y1 - y2);

            const advanceStep = () => {
                if (stepIndex < STEPS.length - 1) {
                    setStepIndex(prev => prev + 1);
                    setPlacedTools([]); setAttachedItem(null); setDragPath(null); setActiveTool(null);
                    if (stepIndex !== STEPS.length - 2) showToast("Harika! Görev tamamlandı.");
                }
            };

            const getPlacedToolTransform = (t) => {
                let trX = -50, trY = -10;
                if (isAnimatingStep1 && stepIndex === 1) {
                    if (t.id === 'portegu') { trX = -60; trY = -20; }
                    if (t.id === 'penset') { trX = -40; trY = 0; }
                }
                return `translate(${trX}%, ${trY}%) rotate(${t.rot}deg)`;
            };

            const handlePointerDown = (e, tool) => {
                e.preventDefault(); e.stopPropagation();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                
                setActiveTool(tool);
                setToolPos({ x: clientX, y: clientY });

                if (tool.id === 'penset' && stepIndex === 0) setToolRotation(160);
                else if (tool.id === 'portegu' && stepIndex === 1) setToolRotation(135);
                else if (tool.id === 'penset' && stepIndex === 1) setToolRotation(-30);
                else if (tool.id === 'penset' && stepIndex === 2) setToolRotation(160);
                else setToolRotation(0);
            };

            const handlePointerMove = (e) => {
                if (!activeTool) return;
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                setToolPos({ x: clientX, y: clientY });

                if (containerRef.current) {
                    const rect = containerRef.current.getBoundingClientRect();
                    const dropX = ((clientX - rect.left) / rect.width) * 100;
                    const dropY = ((clientY - rect.top) / rect.height) * 100;

                    if (stepIndex === 0 && activeTool.id === 'makas' && placedTools.find(t => t.id === 'penset')) {
                        if (checkDistance(dropX, dropY, 52, 75) < 15 && dragPath !== 'cutting') {
                            setDragPath('cutting'); showToast("Kesmeye başlandı, şimdi hedefe sürükle!");
                        }
                    }
                    if (stepIndex === 2 && activeTool.id === 'penset' && !attachedItem) {
                        if (clientY > window.innerHeight - 150) {
                            setAttachedItem('kagit'); showToast("Kurutma kağıdı alındı!");
                        }
                    }
                }
            };

            const handlePointerUp = (e) => {
                if (!activeTool) return;
                const clientX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
                const clientY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
                const rect = containerRef.current.getBoundingClientRect();
                const dropX = ((clientX - rect.left) / rect.width) * 100;
                const dropY = ((clientY - rect.top) / rect.height) * 100;

                let toolId = activeTool.id;
                const tolerance = 18;

                if (stepIndex === 0) {
                    if (toolId === 'penset' && !placedTools.find(t => t.id === 'penset')) {
                        if (checkDistance(dropX, dropY, 50, 70) < tolerance) {
                            setPlacedTools([...placedTools, { id: 'penset', src: 'penset.png', x: 50, y: 70, rot: 160 }]);
                            showToast("Penset yerleştirildi. Şimdi makas ile kes.");
                        } else showToast("Penset yanlış yerde.");
                    } else if (toolId === 'makas') {
                        if (dragPath === 'cutting') {
                            if (checkDistance(dropX, dropY, 46, 71) < 20) advanceStep();
                            else { showToast("Kesme işlemini tamamlamak için sonuna kadar sürükle."); setDragPath(null); }
                        }
                    }
                } 
                else if (stepIndex === 1) {
                    let newPlaced = [...placedTools];
                    if (toolId === 'portegu' && !placedTools.find(t => t.id === 'portegu') && checkDistance(dropX, dropY, 50, 69) < tolerance) {
                        newPlaced.push({ id: 'portegu', src: 'portegu.png', x: 50, y: 69, rot: 135 }); showToast("Portegü yerleştirildi.");
                    }
                    if (toolId === 'penset' && !placedTools.find(t => t.id === 'penset') && checkDistance(dropX, dropY, 55, 72) < tolerance) {
                        newPlaced.push({ id: 'penset', src: 'penset.png', x: 55, y: 72, rot: -30 }); showToast("Penset yerleştirildi.");
                    }
                    setPlacedTools(newPlaced);
                    if (newPlaced.length === 2) {
                        setIsAnimatingStep1(true);
                        setTimeout(() => { setIsAnimatingStep1(false); advanceStep(); }, 500);
                    }
                }
                else if (stepIndex === 2) {
                    if (toolId === 'penset' && attachedItem === 'kagit') {
                        if (checkDistance(dropX, dropY, 52, 70) < tolerance) advanceStep();
                        else showToast("Siyatik sinirin altına bırakmalısın.");
                    } else if (toolId === 'penset') showToast("Önce araç kutusundan kurutma kağıdını almalısın!");
                }
                else if (stepIndex === 3) {
                    if (toolId === 'ip' && checkDistance(dropX, dropY, 74, 67) < tolerance) advanceStep();
                }
                else if (stepIndex === 4) {
                    if (toolId === 'makas' && checkDistance(dropX, dropY, 74, 67) < tolerance) advanceStep();
                }
                else if (stepIndex === 5) {
                    if (toolId === 'atac' && !placedTools.find(t => t.id === 'atac_placed')) {
                        if (checkDistance(dropX, dropY, 63, 30) < tolerance) {
                            setPlacedTools([{ id: 'atac_placed', src: 'atac.png', x: 63, y: 30, rot: 0 }]);
                            showToast("Ataç takıldı, şimdi kancaya as!");
                        }
                    } else if (toolId === 'atac_placed') {
                        if (checkDistance(dropX, dropY, 59, 14) < 25) advanceStep();
                        else setPlacedTools([{ id: 'atac_placed', src: 'atac.png', x: 63, y: 30, rot: 0 }]);
                    }
                }

                setActiveTool(null);
                setToolRotation(0);
            };

            return (
                <div className="flex flex-col h-screen w-full relative bg-white" onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerLeave={handlePointerUp}>
                    <div className="bg-blue-500 text-white p-3 md:p-4 shadow-md z-10 flex flex-col justify-center min-h-[80px] md:min-h-[100px] relative">
                        <p className="text-center font-semibold text-sm md:text-xl leading-snug pr-20 md:pr-24">{currentStep.instruction}</p>
                        {stepIndex === STEPS.length - 1 && !showFinalModal && (
                            <button onClick={onComplete} className="absolute top-1/2 -translate-y-1/2 right-2 md:right-4 bg-red-600 text-white text-xs md:text-base font-bold py-2 px-3 md:px-4 rounded-lg shadow-lg active:scale-95 transition-transform z-50 animate-pulse whitespace-nowrap">
                                🔴 Kayda Başla
                            </button>
                        )}
                    </div>

                    {toastMsg && <div className="absolute top-[100px] md:top-[120px] left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full shadow-lg z-50 text-xs md:text-sm font-semibold toast-enter pointer-events-none whitespace-nowrap">{toastMsg}</div>}

                    <div className="flex-1 relative w-full overflow-hidden flex justify-center items-center p-2 md:p-4" ref={containerRef}>
                        <div className="relative w-full max-w-lg aspect-square">
                            <img src={currentStep.image} alt="Kurbağa" className="w-full h-full object-contain select-none" draggable="false" />
                            
                            {placedTools.map((t, i) => (
                                <div key={i} className={`absolute w-20 h-20 md:w-28 md:h-28 ${t.id === 'atac_placed' ? 'cursor-grab touch-none z-30' : 'pointer-events-none z-10'}`}
                                    style={{ left: `${t.x}%`, top: `${t.y}%`, transform: getPlacedToolTransform(t), transformOrigin: '50% 10%', transition: 'transform 0.5s ease-out' }}
                                    onPointerDown={(e) => {
                                        if (t.id === 'atac_placed') {
                                            setActiveTool({ id: 'atac_placed', src: t.src, name: 'Ataç' });
                                            setPlacedTools(placedTools.filter(p => p.id !== t.id)); 
                                            handlePointerDown(e, { id: 'atac_placed', src: t.src, name: 'Ataç' });
                                        }
                                    }}>
                                    <img src={t.src} alt="Placed tool" className="w-full h-full object-contain" />
                                </div>
                            ))}
                        </div>
                    </div>

                    {stepIndex < STEPS.length - 1 && (
                        <div className="bg-gray-100 border-t border-gray-300 p-2 md:p-4 h-20 md:h-28 flex items-center justify-around z-10 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] relative">
                            {TOOLS.map(tool => (
                                <div key={tool.id} className={`w-12 h-12 md:w-16 md:h-16 flex items-center justify-center p-1 md:p-2 rounded-lg md:rounded-xl bg-white shadow-sm border border-gray-200 cursor-grab touch-none ${activeTool?.id === tool.id ? 'opacity-30' : ''}`} onPointerDown={(e) => handlePointerDown(e, tool)}>
                                    <img src={tool.src} alt={tool.name} className="max-w-full max-h-full object-contain pointer-events-none" onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='block'; }}/>
                                    <span style={{display: 'none'}} className="text-[8px] md:text-[10px] leading-tight font-bold text-gray-400 text-center">{tool.name}</span>
                                </div>
                            ))}
                        </div>
                    )}

                    {activeTool && (
                        <div className="fixed pointer-events-none z-50 w-20 h-20 md:w-32 md:h-32 flex items-center justify-center" style={{ left: toolPos.x, top: toolPos.y, transform: `translate(-50%, -10%) rotate(${toolRotation}deg)`, transformOrigin: '50% 10%', transition: 'transform 0.1s ease-out' }}>
                            <img src={activeTool.src} alt={activeTool.name} className="w-full h-full object-contain drop-shadow-xl" onError={(e) => { e.target.style.display='none'; }}/>
                            {attachedItem === 'kagit' && activeTool.id === 'penset' && <img src="kurutmakagidi.png" alt="Kagıt" className="absolute top-[10%] left-[50%] w-8 h-8 md:w-12 md:h-12 object-contain drop-shadow-md transform -translate-x-1/2 -translate-y-1/2" />}
                        </div>
                    )}
                    
                    {showFinalModal && (
                        <div className="absolute inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl p-6 md:p-8 max-w-sm w-full text-center shadow-2xl animate-bounce">
                                <h2 className="text-3xl md:text-4xl mb-2 md:mb-4">🎉</h2>
                                <h3 className="text-xl md:text-2xl font-bold text-gray-800 mb-2">Tebrikler!</h3>
                                <p className="text-sm md:text-base text-gray-600 mb-2">Kurbağa deney için hazırlandı.</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };


        // ==========================================
        // COMPONENT: BÖLÜM 2 (KAYIT AŞAMASI)
        // ==========================================
        const Part2 = ({ onBack }) => {
            const [connection, setConnection] = useState('none'); 
            const [mode, setMode] = useState('single'); 
            const [isRecording, setIsRecording] = useState(false);
            const [autoStimulating, setAutoStimulating] = useState(false);
            const [voltage, setVoltage] = useState(0.0);
            const [frequency, setFrequency] = useState(1);
            
            const [isSelecting, setIsSelecting] = useState(false);
            const [selectionEnabled, setSelectionEnabled] = useState(false);

            const [tblFreq, setTblFreq] = useState('-');
            const [tblDur, setTblDur] = useState('-');

            const [toastMsg, setToastMsg] = useState('');
            const [showPtpModal, setShowPtpModal] = useState(false);

            // --- Mutable State (Physiology & Graphics) ---
            const sim = useRef({
                timeMs: 0,
                lastFrameTime: 0,
                lastAutoStimTime: 0,
                lastVisualUpdateTime: 0,
                stimEvents: [],
                forceData: [],
                
                // Physics Configs
                msPerPixel: 12.5, // Ekrana yaklaşık 10 saniye sığdırır
                viewOffset: 0,
                canvasWidth: 800,
                
                // Selection logic
                selStartPixel: 0,
                selEndPixel: 0,
                selectionActive: false,
                selVoltVal: '-',
                selAmpVal: '-',

                // Advanced Physiology (Tetanus, PTP & Fatigue)
                tetanusStartTime: null,
                fatiguePhaseTimer: 0,
                globalFatigue: 0.0, // 0.0 (fresh) to 1.0 (max fatigue)
                ptpEligible: false,
                lastTetanusEndTime: 0,
                
                // Message flags to prevent spamming
                msgFlags: {
                    ptpHint: false,
                    fatigueHint: false,
                    testFatigue: false
                }
            }).current;

            const workAreaRef = useRef(null);
            const forceCanvas = useRef(null);
            const stimCanvas = useRef(null);
            const overlayCanvas = useRef(null);
            const frogImgRef = useRef(null);
            const scrollRef = useRef(null);

            const [activeTool, setActiveTool] = useState(null);
            const [toolPos, setToolPos] = useState({ x: 0, y: 0 });

            // Drop zones 
            const dropZones = {
                direct: { x: 67.5, y: 62.5, radius: 7.5 },
                indirect: { x: 55, y: 80, radius: 15 }  
            };

            const showToast = useCallback((msg) => {
                setToastMsg(msg);
                setTimeout(() => setToastMsg(''), 4000);
            }, []);

            // --- Math / Physiology Methods ---
            const calculateCurrentForce = (currentTime) => {
                let rawSum = 0;
                for (let i = sim.stimEvents.length - 1; i >= 0; i--) {
                    const ev = sim.stimEvents[i];
                    const dt = currentTime - ev.time;
                    if (dt > 1500) break; // Gevşeme fazı uzayabileceği için döngü limiti artırıldı
                    
                    if (dt >= 0) {
                        // Eşik (Threshold) ve Maksimum Değer Ayarları
                        let thresh = ev.type === 'direct' ? 2.0 : 0.5;
                        let maxV = ev.type === 'direct' ? 8.0 : 2.0;
                        let range = maxV - thresh;
                        
                        let baseAmp = 0;
                        if (ev.voltage >= thresh) {
                            let f = (ev.voltage - thresh) / range;
                            baseAmp = 0.2 + 0.8 * Math.max(0, Math.min(1.0, f)); // 0.2 to 1.0 arası genlik faktörü
                        }

                        if (baseAmp > 0) {
                            // Yorgunluk Matematiği (Prompt spesifikasyonları)
                            let isFatigued = ev.fatigue > 0.3; // Yorgunluk belirginleştiğinde
                            let L = 50 + (isFatigued ? 10 : 0); // Latent periyod: 50ms -> 60ms
                            let tc = 40 + (isFatigued ? 10 : 0); // Kasılma süresi: 40ms -> 50ms
                            let tau = 40 * (isFatigued ? 1.8 : 1.0); // Gevşeme süresi %80 uzar
                            
                            // PTP ve Yorgunluk genlik çarpanları
                            let finalAmp = baseAmp * (ev.isPTP ? 1.6 : Math.max(0.1, 1.0 - ev.fatigue * 1.1)); 

                            if (dt >= L) {
                                const tAct = dt - L;
                                if (tAct < tc) {
                                    rawSum += finalAmp * Math.sin((Math.PI / 2) * (tAct / tc)); // Kasılma (Yükseliş)
                                } else {
                                    rawSum += finalAmp * Math.exp(-(tAct - tc) / tau); // Gevşeme (Düşüş)
                                }
                            }
                        }
                    }
                }
                // Asimptotik tetani sınırı. rawSum yükseldikçe 40g limitine yaklaşır.
                return 40 * (1 - Math.exp(-rawSum * 0.6)); 
            };

            const fireStimulus = useCallback(() => {
                if (!isRecording) return;
                
                let isPTP = false;
                // PTP Kontrolü: Tek uyarı, PTP'ye uygun, ve tetani biteli 3-6 saniye olmuşsa
                if (sim.ptpEligible && mode === 'single' && sim.lastTetanusEndTime > 0) {
                    const timeSinceTetanus = sim.timeMs - sim.lastTetanusEndTime;
                    if (timeSinceTetanus >= 3000 && timeSinceTetanus <= 6000) {
                        isPTP = true;
                        setShowPtpModal(true);
                        setTimeout(() => setShowPtpModal(false), 2000);
                        sim.ptpEligible = false; // Bir kere kullanılır
                    }
                }

                sim.stimEvents.push({ 
                    time: sim.timeMs, 
                    voltage: voltage, 
                    type: connection,
                    fatigue: sim.globalFatigue,
                    isPTP: isPTP
                });
            }, [isRecording, voltage, connection, mode, sim]);

            // --- Animation Loop ---
            useEffect(() => {
                let reqId;
                const loop = (timestamp) => {
                    if (!isRecording) { reqId = requestAnimationFrame(loop); return; }

                    const delta = timestamp - sim.lastFrameTime;
                    sim.lastFrameTime = timestamp;
                    sim.timeMs += Math.min(delta, 50);

                    // Auto Stim
                    if (autoStimulating) {
                        const period = 1000 / frequency;
                        if (sim.timeMs - sim.lastAutoStimTime >= period) {
                            fireStimulus();
                            sim.lastAutoStimTime = sim.timeMs;
                        }
                    }

                    // Physics & Visual updates
                    if (sim.timeMs - (sim.forceData.length > 0 ? sim.forceData[sim.forceData.length-1].time : 0) > 10) {
                        const currentForce = calculateCurrentForce(sim.timeMs);
                        sim.forceData.push({ time: sim.timeMs, force: currentForce });
                        
                        // Yorgunluk (Fatigue) ve Tetani Aşamaları Kontrolü
                        if (currentForce > 20) { 
                            if (sim.tetanusStartTime === null) {
                                sim.tetanusStartTime = sim.timeMs;
                            }
                            sim.fatiguePhaseTimer += delta;
                            
                            // 5 Saniye Tetani -> PTP Hazırlığı
                            if (sim.fatiguePhaseTimer > 5000 && !sim.msgFlags.ptpHint) {
                                showToast("post tetanik sarsı güçlenmesini gözlemlemek için uyarıyı sonlandırdıktan saniyeler sonra tek bir uyarı verin");
                                sim.msgFlags.ptpHint = true;
                                sim.ptpEligible = true;
                            }
                            // 10 Saniye Tetani -> Yorgunluk Bilgisi
                            if (sim.fatiguePhaseTimer > 10000 && !sim.msgFlags.fatigueHint) {
                                showToast("yorgunluğu gözlemlemek için tetanik kasılmaya devam edin");
                                sim.msgFlags.fatigueHint = true;
                            }
                            // 20 Saniye Sonrası -> Güç Düşüşü (Yorgunluk Başlar)
                            if (sim.fatiguePhaseTimer > 20000) {
                                // 20s ile 35s arasında yorgunluk %0'dan %70'e çıkar
                                sim.globalFatigue = Math.min(0.7, (sim.fatiguePhaseTimer - 20000) / 15000 * 0.7);
                            }
                            // 35 Saniye Sonrası -> Çok yavaş düşüş devam eder, Test istenir
                            if (sim.fatiguePhaseTimer > 35000) {
                                sim.globalFatigue = 0.7 + Math.min(0.15, (sim.fatiguePhaseTimer - 35000) / 100000 * 0.15);
                                if (!sim.msgFlags.testFatigue) {
                                    showToast("yorgun kasta tek sarsı eğrisini görmek için tek uyarı verin");
                                    sim.msgFlags.testFatigue = true;
                                }
                            }
                        } else {
                            if (sim.tetanusStartTime !== null) {
                                sim.lastTetanusEndTime = sim.timeMs; 
                                sim.tetanusStartTime = null;
                            }
                        }

                        // Görsel güncelleme
                        if (sim.timeMs - sim.lastVisualUpdateTime > 30) {
                            sim.lastVisualUpdateTime = sim.timeMs;
                            if (frogImgRef.current) {
                                let newSrc = '07final.png';
                                if (connection === 'direct') {
                                    newSrc = currentForce > 2.0 ? '09direct_kasilma.png' : '08direct.png';
                                } else if (connection === 'indirect') {
                                    newSrc = currentForce > 2.0 ? '11indirect_kasilma.png' : '10indirect.png';
                                }
                                if (!frogImgRef.current.src.includes(newSrc)) frogImgRef.current.src = newSrc;
                            }
                        }
                    }

                    updateScrollbar();
                    drawGraphs();

                    reqId = requestAnimationFrame(loop);
                };

                reqId = requestAnimationFrame(loop);
                return () => cancelAnimationFrame(reqId);
            }, [isRecording, autoStimulating, frequency, voltage, connection, fireStimulus]);

            // --- Graphics Engine ---
            const resizeCanvas = () => {
                if (!forceCanvas.current) return;
                const container = forceCanvas.current.parentElement;
                sim.canvasWidth = container.clientWidth;
                // Grafikler daraltıldı (Yükseklik 180px toplam)
                forceCanvas.current.width = sim.canvasWidth;
                forceCanvas.current.height = 110;
                stimCanvas.current.width = sim.canvasWidth;
                stimCanvas.current.height = 70;
                overlayCanvas.current.width = sim.canvasWidth;
                overlayCanvas.current.height = 180;
                drawGraphs();
                if(sim.selectionActive) drawOverlay();
            };

            useEffect(() => {
                window.addEventListener('resize', resizeCanvas);
                resizeCanvas();
                return () => window.removeEventListener('resize', resizeCanvas);
            }, []);

            const updateScrollbar = () => {
                if (!scrollRef.current) return;
                const viewDuration = sim.canvasWidth * sim.msPerPixel;
                const maxOffset = Math.max(0, sim.timeMs - viewDuration);
                scrollRef.current.max = maxOffset;
                if (isRecording) {
                    sim.viewOffset = maxOffset;
                    scrollRef.current.value = maxOffset;
                }
            };

            const clearSelection = () => {
                sim.selectionActive = false;
                setIsSelecting(false);
                setTblDur('-'); setTblFreq('-');
                sim.selVoltVal = '-'; sim.selAmpVal = '-';
                if (overlayCanvas.current) {
                    overlayCanvas.current.getContext('2d').clearRect(0,0, sim.canvasWidth, 180);
                }
            };

            const drawGraphs = () => {
                if (!forceCanvas.current || !stimCanvas.current) return;
                const ctxF = forceCanvas.current.getContext('2d');
                const ctxS = stimCanvas.current.getContext('2d');
                
                ctxF.clearRect(0, 0, sim.canvasWidth, 110);
                ctxS.clearRect(0, 0, sim.canvasWidth, 70);

                const vOffset = isRecording ? Math.max(0, sim.timeMs - (sim.canvasWidth * sim.msPerPixel)) : sim.viewOffset;

                // Force Axis/Grid 
                ctxF.beginPath(); ctxF.strokeStyle = 'rgba(0,0,0,0.05)'; ctxF.lineWidth = 1;
                for(let i=0; i<=40; i+=10) {
                    let y = 100 - (i/40) * 90; 
                    ctxF.moveTo(0, y); ctxF.lineTo(sim.canvasWidth, y);
                    if(i>0) { ctxF.fillStyle = '#9ca3af'; ctxF.font = '10px Arial'; ctxF.fillText(i, 14, y+3); }
                }
                ctxF.stroke();

                // Force Curve
                ctxF.beginPath(); ctxF.strokeStyle = '#1d4ed8'; ctxF.lineWidth = 2; ctxF.lineJoin = 'round';
                let firstPoint = true;
                const startIndex = Math.max(0, sim.forceData.findIndex(d => d.time >= vOffset) - 1);
                let endIndex = sim.forceData.findIndex(d => d.time > vOffset + sim.canvasWidth * sim.msPerPixel);
                if (endIndex === -1) endIndex = sim.forceData.length;
                else endIndex = Math.min(sim.forceData.length, endIndex + 1);

                for (let i = startIndex; i < endIndex; i++) {
                    const d = sim.forceData[i];
                    const x = (d.time - vOffset) / sim.msPerPixel;
                    const y = 100 - (Math.min(40, d.force) / 40) * 90;
                    if (firstPoint) { ctxF.moveTo(x, y); firstPoint = false; } else ctxF.lineTo(x, y);
                }
                ctxF.stroke();

                // Stimulus Axis 
                ctxS.strokeStyle = 'rgba(0,0,0,0.1)'; ctxS.beginPath();
                ctxS.moveTo(0, 50); ctxS.lineTo(sim.canvasWidth, 50);
                for(let i=5; i<=15; i+=5) {
                    let y = 50 - (i/15) * 40;
                    ctxS.moveTo(0, y); ctxS.lineTo(sim.canvasWidth, y);
                    ctxS.fillStyle = '#9ca3af'; ctxS.font = '10px Arial'; ctxS.fillText(i, 14, y+3);
                }
                ctxS.stroke();

                // Stimulus Lines
                for (let ev of sim.stimEvents) {
                    if (ev.time >= vOffset && ev.time <= vOffset + sim.canvasWidth * sim.msPerPixel) {
                        const x = (ev.time - vOffset) / sim.msPerPixel;
                        const h = (ev.voltage / 15) * 40;
                        ctxS.beginPath(); ctxS.strokeStyle = '#ef4444'; ctxS.lineWidth = 2;
                        ctxS.moveTo(x, 50); ctxS.lineTo(x, 50 - h); ctxS.stroke();
                    }
                }
                
                // Time markers
                ctxS.fillStyle = '#64748b'; ctxS.font = '10px Arial'; ctxS.textAlign = 'center';
                for(let t = Math.floor(vOffset/1000)*1000; t <= vOffset + sim.canvasWidth * sim.msPerPixel; t+=1000) {
                    if(t < vOffset) continue;
                    let x = (t - vOffset) / sim.msPerPixel;
                    ctxS.fillText((t/1000).toFixed(1) + "s", x, 65);
                    ctxS.beginPath(); ctxS.moveTo(x, 50); ctxS.lineTo(x, 55); ctxS.strokeStyle = '#64748b'; ctxS.lineWidth=1; ctxS.stroke();
                }
                ctxS.textAlign = 'left';
            };

            // --- Control Handlers ---
            const handleRecordToggle = () => {
                if (!isRecording) {
                    sim.lastFrameTime = performance.now();
                    clearSelection();
                } else {
                    if (autoStimulating) setAutoStimulating(false);
                    updateScrollbar();
                    drawGraphs();
                }
                setIsRecording(!isRecording);
            };

            const handleVoltPlus = () => {
                setVoltage(v => {
                    let nextV = v;
                    if (v < 1.0) nextV = v + 0.2;
                    else nextV = v + 1.0;
                    nextV = Math.round(nextV * 10) / 10;
                    return Math.min(10.0, nextV);
                });
            };
            const handleVoltMinus = () => {
                setVoltage(v => {
                    let nextV = v;
                    if (v <= 1.0) nextV = v - 0.2;
                    else nextV = v - 1.0;
                    nextV = Math.round(nextV * 10) / 10;
                    return Math.max(0.0, nextV);
                });
            };

            // --- Interaction Logic ---
            const checkDistance = (x1, y1, x2, y2) => Math.hypot(x1 - x2, y1 - y2);

            const handlePointerDown = (e) => {
                if (connection !== 'none') return;
                e.preventDefault(); e.stopPropagation();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                setActiveTool('stimulator');
                setToolPos({ x: clientX, y: clientY });
            };

            const handlePointerMove = (e) => {
                if (!activeTool) return;
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                setToolPos({ x: clientX, y: clientY });
            };

            const handlePointerUp = (e) => {
                if (!activeTool) return;
                const clientX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
                const clientY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
                
                if (workAreaRef.current) {
                    const rect = workAreaRef.current.getBoundingClientRect();
                    const dropX = ((clientX - rect.left) / rect.width) * 100;
                    const dropY = ((clientY - rect.top) / rect.height) * 100;

                    if (checkDistance(dropX, dropY, dropZones.direct.x, dropZones.direct.y) < dropZones.direct.radius) {
                        setConnection('direct');
                        if(frogImgRef.current) frogImgRef.current.src = '08direct.png';
                    } else if (checkDistance(dropX, dropY, dropZones.indirect.x, dropZones.indirect.y) < dropZones.indirect.radius) {
                        setConnection('indirect');
                        if(frogImgRef.current) frogImgRef.current.src = '10indirect.png';
                    }
                }
                setActiveTool(null);
            };

            const handleDisconnect = () => {
                setConnection('none');
                if(frogImgRef.current) frogImgRef.current.src = '07final.png';
            };

            // Selection Logic
            const calcSelectionStats = () => {
                const vOffset = sim.viewOffset;
                const xMin = Math.min(sim.selStartPixel, sim.selEndPixel);
                const xMax = Math.max(sim.selStartPixel, sim.selEndPixel);
                const tStart = vOffset + xMin * sim.msPerPixel;
                const tEnd = vOffset + xMax * sim.msPerPixel;
                const dur = tEnd - tStart;
                
                let maxF = 0, minF = 999, fPoints = 0;
                for(let d of sim.forceData) {
                    if(d.time >= tStart && d.time <= tEnd) {
                        if(d.force > maxF) maxF = d.force;
                        if(d.force < minF) minF = d.force;
                        fPoints++;
                    }
                }
                if(fPoints === 0) { minF=0; maxF=0; }
                
                let stimCount = 0, lastV = 0;
                for(let ev of sim.stimEvents) {
                    if(ev.time >= tStart && ev.time <= tEnd) { stimCount++; lastV = ev.voltage; }
                }
                
                sim.selVoltVal = stimCount > 0 ? `${lastV.toFixed(1)} V` : '-';
                setTblFreq(stimCount > 1 && dur > 0 ? `${(stimCount / (dur/1000)).toFixed(1)} Hz` : (stimCount===1 ? 'Tek' : '-'));
                sim.selAmpVal = maxF > 0.5 ? maxF.toFixed(1) : '-'; // Max amplitude logic
                setTblDur(dur.toFixed(0));
            };

            const drawOverlay = () => {
                if(!overlayCanvas.current) return;
                const ctx = overlayCanvas.current.getContext('2d');
                ctx.clearRect(0,0, sim.canvasWidth, 180);
                if (isSelecting || sim.selectionActive) {
                    const x1 = Math.min(sim.selStartPixel, sim.selEndPixel);
                    const w = Math.abs(sim.selEndPixel - sim.selStartPixel);
                    
                    ctx.fillStyle = 'rgba(59, 130, 246, 0.2)';
                    ctx.fillRect(x1, 0, w, 180);
                    ctx.strokeStyle = 'rgba(59, 130, 246, 0.8)';
                    ctx.strokeRect(x1, 0, w, 180);

                    if (sim.selectionActive && w > 5) {
                        ctx.font = 'bold 12px sans-serif';
                        ctx.textAlign = 'center';
                        
                        if (sim.selAmpVal !== '-') {
                            ctx.fillStyle = '#1e3a8a';
                            ctx.fillText(sim.selAmpVal + ' g', x1 + w/2, 20); 
                        }
                        
                        if (sim.selVoltVal !== '-') {
                            ctx.fillStyle = '#b91c1c';
                            ctx.fillText(sim.selVoltVal, x1 + w/2, 125); 
                        }
                        ctx.textAlign = 'left';
                    }
                }
            };

            const handleOverlayDown = (e) => {
                if (!selectionEnabled || isRecording) return;
                const rect = overlayCanvas.current.getBoundingClientRect();
                sim.selStartPixel = e.clientX - rect.left;
                sim.selEndPixel = sim.selStartPixel;
                sim.selectionActive = false;
                setIsSelecting(true);
            };
            const handleOverlayMove = (e) => {
                if (!isSelecting) return;
                const rect = overlayCanvas.current.getBoundingClientRect();
                sim.selEndPixel = Math.max(0, Math.min(e.clientX - rect.left, sim.canvasWidth));
                calcSelectionStats();
                drawOverlay();
            };
            const handleOverlayUp = () => {
                if (!isSelecting) return;
                setIsSelecting(false);
                if (Math.abs(sim.selEndPixel - sim.selStartPixel) > 5) {
                    sim.selectionActive = true;
                    calcSelectionStats();
                    drawOverlay();
                } else {
                    clearSelection();
                }
            };

            return (
                <div className="flex flex-col h-screen bg-slate-100 font-sans" onPointerMove={handlePointerMove} onPointerUp={handlePointerUp} onPointerLeave={handlePointerUp}>
                    
                    {/* Top Graph Area */}
                    <div className="flex-none bg-white border-b shadow-sm z-10 flex flex-col">
                        <div className="flex items-center p-1 md:p-2 bg-slate-200 border-b border-slate-300">
                            {!isRecording ? (
                                <button onClick={handleRecordToggle} className="w-8 h-8 md:w-10 md:h-10 bg-green-500 hover:bg-green-600 text-white rounded shadow flex items-center justify-center transition-colors shrink-0" title="Kaydı Başlat">
                                    <svg className="w-4 h-4 md:w-6 md:h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6z"/></svg>
                                </button>
                            ) : (
                                <button onClick={handleRecordToggle} className="w-8 h-8 md:w-10 md:h-10 bg-red-500 hover:bg-red-600 text-white rounded shadow flex items-center justify-center transition-colors shrink-0" title="Kaydı Durdur">
                                    <svg className="w-4 h-4 md:w-6 md:h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M5 5h10v10H5z"/></svg>
                                </button>
                            )}
                            
                            <div className="h-4 md:h-6 w-px bg-slate-400 mx-1 md:mx-2"></div>
                            
                            <button onClick={() => { sim.msPerPixel = Math.max(1, sim.msPerPixel - 1); if(!isRecording) { updateScrollbar(); drawGraphs(); drawOverlay(); } }} className="w-7 h-7 md:w-8 md:h-8 bg-white border border-slate-300 hover:bg-slate-100 text-slate-700 rounded shadow-sm flex items-center justify-center text-lg md:text-xl font-bold shrink-0">+</button>
                            <button onClick={() => { sim.msPerPixel = Math.min(20, sim.msPerPixel + 1); if(!isRecording) { updateScrollbar(); drawGraphs(); drawOverlay(); } }} className="w-7 h-7 md:w-8 md:h-8 bg-white border border-slate-300 hover:bg-slate-100 text-slate-700 rounded shadow-sm flex items-center justify-center text-lg md:text-xl font-bold shrink-0 ml-1">-</button>
                            
                            {tblDur !== '-' && (
                                <div className="ml-2 text-[10px] md:text-xs font-semibold text-blue-800 bg-blue-100 px-2 py-1 rounded shadow-sm whitespace-nowrap border border-blue-200">
                                    Süre: {tblDur}ms {tblFreq !== '-' && ` | Frekans: ${tblFreq}`}
                                </div>
                            )}

                            <div className="flex-1"></div>
                            
                            <div className="flex items-center gap-1 md:gap-2 text-slate-600 font-semibold mr-2 md:mr-4 shrink-0 text-xs md:text-base">
                                <div className={`w-2 h-2 md:w-3 md:h-3 rounded-full ${isRecording ? 'bg-red-500 animate-pulse' : 'bg-slate-400'}`}></div>
                                <span className={isRecording ? 'text-red-500' : 'text-slate-600'}>{isRecording ? 'Kayıt...' : 'Hazır'}</span>
                            </div>

                            {!isRecording && (
                                <button onClick={() => setSelectionEnabled(!selectionEnabled)} className={`px-2 py-1 md:px-3 md:py-1.5 border rounded shadow-sm flex items-center gap-1 shrink-0 text-xs md:text-sm ${selectionEnabled ? 'bg-blue-600 border-blue-700 text-white' : 'bg-blue-100 border-blue-300 text-blue-700 hover:bg-blue-200'}`}>
                                    <svg className="w-3 h-3 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"/></svg>
                                    İmleç Seç
                                </button>
                            )}
                        </div>

                        <div className="relative w-full h-[180px]" style={{backgroundImage: 'linear-gradient(#f0f0f0 1px, transparent 1px), linear-gradient(90deg, #f0f0f0 1px, transparent 1px)', backgroundSize: '20px 20px'}}>
                            <div className="absolute left-0 top-0 bottom-0 w-12 bg-white/90 border-r border-slate-300 z-10 flex flex-col pointer-events-none">
                                <div className="h-[110px] flex items-center justify-center -rotate-90 text-[10px] md:text-xs font-bold text-slate-600">Kuvvet (g)</div>
                                <div className="h-[70px] flex items-center justify-center -rotate-90 text-[10px] md:text-xs font-bold text-slate-600">Uyarı (V)</div>
                            </div>
                            <canvas ref={forceCanvas} className="absolute top-0 left-0 w-full h-[110px] border-b border-gray-300"></canvas>
                            <canvas ref={stimCanvas} className="absolute top-[110px] left-0 w-full h-[70px]"></canvas>
                            <canvas ref={overlayCanvas} 
                                    className={`absolute top-0 left-0 w-full h-full z-20 ${selectionEnabled && !isRecording ? 'cursor-crosshair' : 'pointer-events-none'}`}
                                    onPointerDown={handleOverlayDown} onPointerMove={handleOverlayMove} onPointerUp={handleOverlayUp} onPointerLeave={handleOverlayUp}></canvas>
                        </div>
                        
                        <div className="px-12 py-1 bg-slate-100 border-t border-slate-300">
                            <input type="range" ref={scrollRef} min="0" max="100" defaultValue="100" disabled={isRecording} className={`time-scroll ${isRecording ? 'opacity-50' : ''}`}
                                   onChange={(e) => { 
                                       sim.viewOffset = parseFloat(e.target.value); 
                                       if(sim.selectionActive || isSelecting) clearSelection();
                                       drawGraphs(); 
                                   }} />
                        </div>
                    </div>

                    <div className={`flex-none text-white text-center py-1 md:py-1.5 px-2 text-[10px] md:text-sm font-semibold shadow-md z-20 ${connection === 'none' ? 'bg-blue-500' : connection === 'direct' ? 'bg-indigo-500' : 'bg-yellow-600'}`}>
                        {connection === 'none' ? 'Görev: Stimülatörü kasın / sinirin üzerine sürükleyin.'
                            : connection === 'direct' ? 'Görev: Kaydı başlatın ve voltajı artırarak uyarı verin.'
                            : 'Görev: Kaydı başlatın, voltajı artırıp eşiği bulun. Multi modda treppe/tetani gözlemleyin.'}
                    </div>

                    {toastMsg && <div className="absolute top-[10px] md:top-[20px] left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-4 py-2 rounded-full shadow-lg z-50 text-[10px] md:text-sm font-semibold toast-enter pointer-events-none whitespace-nowrap">{toastMsg}</div>}

                    {/* Bottom Work Area */}
                    <div className="flex-1 flex flex-row overflow-hidden relative">
                        
                        {/* Interactive Area (Image) */}
                        <div ref={workAreaRef} className="flex-1 relative bg-white overflow-hidden flex items-end justify-end p-2 md:p-4">
                            
                            {/* Logo */}
                            <img src="sfo.png" alt="SFO Logo" className="absolute top-2 right-2 w-12 h-12 md:w-16 md:h-16 object-contain z-30 opacity-80 pointer-events-none" onError={(e) => e.target.style.display='none'} />

                            {/* Floating Toolbox placed over the image */}
                            <div className="absolute top-2 left-2 md:top-4 md:left-4 z-30 pointer-events-none">
                                <div className="bg-white/90 p-2 rounded shadow border border-slate-300 pointer-events-auto flex flex-col gap-2 w-24 md:w-32 items-center">
                                    <div className="text-[10px] md:text-xs font-bold text-slate-600 border-b border-slate-300 pb-1 w-full text-center">
                                        Bağlantı: <span className={connection === 'none' ? 'text-red-500' : connection === 'direct' ? 'text-blue-600' : 'text-yellow-600'}>{connection === 'none' ? 'Yok' : connection === 'direct' ? 'Kas' : 'Sinir'}</span>
                                    </div>
                                    {connection === 'none' ? (
                                        <div className="flex flex-col items-center py-1">
                                            <div className="w-12 h-12 md:w-16 md:h-16 cursor-grab active:cursor-grabbing hover:scale-105 transition-transform touch-none" onPointerDown={handlePointerDown}>
                                                <img src="stimulator.png" alt="Tool" className="w-full h-full object-contain pointer-events-none" onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }}/>
                                                <div style={{display:'none'}} className="w-full h-full bg-blue-500 text-white rounded items-center justify-center text-[10px] font-bold text-center">Araç</div>
                                            </div>
                                            <span className="text-[8px] md:text-[10px] text-slate-500 mt-1 font-semibold">Sürükle</span>
                                        </div>
                                    ) : (
                                        <button onClick={handleDisconnect} className="bg-red-100 text-red-700 text-[10px] md:text-xs py-1 rounded hover:bg-red-200 border border-red-300 w-full mt-1">Kes</button>
                                    )}
                                </div>
                            </div>

                            <img ref={frogImgRef} src="07final.png" alt="Deney Düzeneği" className="max-w-full max-h-full object-contain object-bottom select-none pointer-events-none" />
                            
                            {/* Floating Tool Image (when dragging) */}
                            {activeTool && (
                                <div className="fixed pointer-events-none z-50 w-16 h-16 md:w-24 md:h-24 flex items-center justify-center drop-shadow-xl"
                                     style={{ left: toolPos.x, top: toolPos.y, transform: 'translate(-50%, -50%)' }}>
                                    <img src="stimulator.png" alt="Stimulator" className="w-full h-full object-contain" onError={(e) => e.target.style.display='none'}/>
                                </div>
                            )}
                        </div>

                        {/* Controls (Right Sidebar) */}
                        <div className="w-40 md:w-56 bg-slate-200 border-l border-slate-300 p-2 md:p-4 flex flex-col z-20 shadow-lg shrink-0 overflow-y-auto">
                            
                            <div className="flex bg-slate-300 rounded p-1 mb-3 shrink-0 mt-2">
                                <button onClick={() => { setMode('single'); if(autoStimulating) setAutoStimulating(false); }} className={`flex-1 rounded py-1 text-[10px] md:text-sm font-semibold transition-all ${mode === 'single' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>Single</button>
                                <button onClick={() => setMode('multi')} className={`flex-1 rounded py-1 text-[10px] md:text-sm font-semibold transition-all ${mode === 'multi' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>Multi</button>
                            </div>

                            <div className="bg-white p-2 md:p-3 rounded shadow-sm mb-3 shrink-0">
                                <label className="text-[10px] md:text-xs font-bold text-slate-500 uppercase">Voltaj (V)</label>
                                <div className="flex items-center mt-1">
                                    <button onClick={handleVoltMinus} className="w-6 h-6 md:w-8 md:h-8 bg-slate-100 hover:bg-slate-200 rounded-l border border-slate-300 font-bold">-</button>
                                    <input type="number" value={voltage.toFixed(1)} readOnly className="w-full h-6 md:h-8 border-y border-slate-300 text-center font-mono font-bold focus:outline-none text-sm md:text-base" />
                                    <button onClick={handleVoltPlus} className="w-6 h-6 md:w-8 md:h-8 bg-slate-100 hover:bg-slate-200 rounded-r border border-slate-300 font-bold">+</button>
                                </div>
                            </div>

                            <div className={`bg-white p-2 md:p-3 rounded shadow-sm mb-3 transition-opacity shrink-0 ${mode === 'single' ? 'opacity-50 pointer-events-none' : ''}`}>
                                <label className="text-[10px] md:text-xs font-bold text-slate-500 uppercase">Frekans (Hz)</label>
                                <div className="flex items-center mt-1">
                                    <button onClick={() => setFrequency(f => Math.max(1, f - 1))} className="w-6 h-6 md:w-8 md:h-8 bg-slate-100 hover:bg-slate-200 rounded-l border border-slate-300 font-bold">-</button>
                                    <input type="number" value={frequency} readOnly className="w-full h-6 md:h-8 border-y border-slate-300 text-center font-mono font-bold focus:outline-none text-sm md:text-base" />
                                    <button onClick={() => setFrequency(f => Math.min(50, f + 1))} className="w-6 h-6 md:w-8 md:h-8 bg-slate-100 hover:bg-slate-200 rounded-r border border-slate-300 font-bold">+</button>
                                </div>
                            </div>

                            <button onClick={() => {
                                if(!isRecording) { alert("Lütfen önce kaydı başlatın."); return; }
                                if(mode === 'single') fireStimulus();
                                else setAutoStimulating(!autoStimulating);
                            }} 
                            disabled={connection === 'none'}
                            className={`w-full py-2 md:py-3 font-bold rounded shadow-md flex items-center justify-center gap-2 transition-transform active:scale-95 disabled:opacity-50 disabled:active:scale-100 mt-auto shrink-0 text-[10px] md:text-sm ${autoStimulating ? 'bg-red-600 hover:bg-red-700 text-white' : 'bg-blue-600 hover:bg-blue-700 text-white'}`}>
                                <svg className="w-3 h-3 md:w-5 md:h-5 text-white" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.381z" clipRule="evenodd"/></svg>
                                <span>{mode === 'single' ? 'TEK UYARI' : autoStimulating ? 'MULTİ DURDUR' : 'MULTİ BAŞLAT'}</span>
                            </button>

                        </div>
                    </div>
                    
                    {/* PTP Modal */}
                    {showPtpModal && (
                        <div className="absolute inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl p-6 max-w-sm w-full text-center shadow-2xl modal-enter">
                                <img src="sezgihoca.png" className="w-24 h-24 mx-auto rounded-full border-4 border-blue-200 mb-4" onError={(e) => e.target.style.display='none'} />
                                <h3 className="text-xl md:text-2xl font-bold text-gray-800 mb-2">Tebrikler!</h3>
                                <p className="text-sm md:text-base text-gray-600 font-semibold">Post Tetanik Sarsı Güçlenmesini gözlemlediniz.</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };


        // ==========================================
        // ANA UYGULAMA (APP) BİLEŞENİ
        // ==========================================
        const App = () => {
            const [screen, setScreen] = useState('menu'); 

            if (screen === 'menu') {
                return (
                    <div className="flex flex-col items-center justify-center w-full h-screen bg-blue-50 p-4 overflow-y-auto">
                        <div className="bg-white rounded-xl shadow-lg p-6 w-full max-w-md text-center border-t-4 border-blue-500 mb-6 shrink-0 mt-4">
                            <div className="relative w-28 h-28 mx-auto mb-4">
                                <div className="w-full h-full bg-blue-200 rounded-full flex items-center justify-center head-bounce shadow-inner overflow-hidden border-4 border-white">
                                   <img src="sezgihoca.png" alt="Sezgi Hoca" className="w-full h-full object-cover" onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='block'; }}/>
                                   <span style={{display: 'none'}} className="text-4xl">👨‍🏫</span>
                                </div>
                            </div>
                            <h1 className="text-xl md:text-2xl font-bold text-gray-800 mb-2">Sezgi Hoca ile Fizyo Lab'a Hoşgeldiniz</h1>
                            <p className="text-gray-600 text-xs md:text-sm">Kurbağa Kas Simülasyonu</p>
                        </div>

                        <div className="flex flex-col w-full max-w-md gap-3 pb-8 shrink-0">
                            <button onClick={() => window.location.href = "https://sezgifirat.github.io/00-kurbaga_hazirlik/"} 
                                    className="bg-blue-600 text-white font-bold py-3 md:py-4 px-4 rounded-xl shadow-md active:scale-95 transition-transform text-sm flex items-center justify-center">
                                <span className="text-lg md:text-xl mr-2">🐸</span> Ön Hazırlık Simülasyonuna Dön
                            </button>
                            <button onClick={() => setScreen('sim')} 
                                    className="bg-blue-600 text-white font-bold py-3 md:py-4 px-4 rounded-xl shadow-md active:scale-95 transition-transform text-sm flex items-center justify-center">
                                ▶️ Deneyi Hazırla (Bölüm 1)
                            </button>
                            <button onClick={() => setScreen('part2')} 
                                    className="bg-blue-600 text-white font-bold py-3 md:py-4 px-4 rounded-xl shadow-md active:scale-95 transition-transform text-sm flex items-center justify-center">
                                ⚡ Doğrudan Kayıt Al (Bölüm 2)
                            </button>
                        </div>
                    </div>
                );
            }

            if (screen === 'sim') {
                return <Part1 onComplete={() => setScreen('part2')} />;
            }

            if (screen === 'part2') {
                return <Part2 onBack={() => setScreen('menu')} />;
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
